worker_processes auto; # Set number of worker threads, auto = cpu count
events {
    worker_connections 1024; # Maximum worker connections at once per process.
}

http {
    upstream nest_api {
        server api:8080; # Points to the NestJS service in docker-compose
        keepalive 32; # Keep connections open to improve performance
    }

    server_tokens off; # Hide nginx version for security
    include mime.types; # Map file extensions to content types

    # Compression settings to shrink JSON payloads
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 256;

    # Maximum client body size; 64k is plenty for standard JSON auth/profile data
    client_max_body_size 64k;

    # Rate Limiting Zones
    limit_req_zone $binary_remote_addr zone=api_limit_short:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_limit_long:10m rate=60r/m;

    server {
        listen 80; # Listen for incoming HTTP requests

        # Simple gateway health check
        location /gateway {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        location / {
            # --- CORS Protection Logic ---
            # Define allowed origin (frontend)
            set $cors_origin "http://localhost:5173";

            # Handle CORS Preflight (OPTIONS request)
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$cors_origin' always;
                add_header 'Access-Control-Allow-Credentials' 'true';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Fingerprint' always;
                add_header 'Access-Control-Max-Age' 1728000; # Cache preflight for 20 days
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204; # No content, fast response
            }

            # Add CORS headers for actual data requests (GET, POST, etc.)
            add_header 'Access-Control-Allow-Origin' '$cors_origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Fingerprint' always;

            # --- Rate Limits ---
            limit_req zone=api_limit_short burst=10 nodelay;
            limit_req zone=api_limit_long burst=20;

            # --- Proxy Settings ---
            proxy_pass http://nest_api; # Forward request to NestJS
            proxy_http_version 1.1; # Required for keepalive
            proxy_set_header Connection ""; # Clear connection header for keepalive

            # Security: Hide backend technology headers
            proxy_hide_header X-Powered-By;

            # Identity headers
            proxy_set_header X-Real-Ip $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Timeouts
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
            proxy_connect_timeout 5s;
        }
    }
}