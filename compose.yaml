services:
  gateway:
    image: nginx:stable-alpine
    ports:
      - 80:80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      api:
        condition: service_healthy

  db_migration:
    image: amacneil/dbmate
    entrypoint: >
      sh -c '
        export DATABASE_URL="postgres://postgres:$$(cat /run/secrets/db_password | tr -d "\n")@dev_db:5432/dev?sslmode=disable";
        dbmate up
      '
    volumes:
      - ./migrations:/db/migrations
    secrets:
      - db_password
    depends_on:
      dev_db:
        condition: service_healthy

  api:
    build: .
    environment:
      - PORT=8080
      - MAX_HEAP_THRESHOLD_MB=300
      - DB_HOST=dev_db
      - DB_PORT=5432
      - DB_PASSWORD_FILE=/run/secrets/db_password
      - DB_USER=postgres
      - DB_NAME=dev
      - DB_POOL_MIN_CONNECTIONS=5
      - DB_POOL_MAX_CONNECTIONS=100
      - NODE_ENV=development
      - JWT_PUBLIC_FILE=/run/secrets/jwt_public
      - JWT_PRIVATE_FILE=/run/secrets/jwt_private
      - JWT_ISSUER=http://localhost:8080
      - JWT_AUDIENCE=API
      - CACHE_HOST=dev_cache
      - CACHE_PORT=6379
      - CACHE_PASSWORD_FILE=/run/secrets/cache_password
      - CACHE_POOL_MIN_CONNECTIONS=5
      - CACHE_POOL_MAX_CONNECTIONS=100
    healthcheck:
      test: ["CMD","wget","-q","-O","-","http://localhost:8080/"]
      interval: 20s
      timeout: 10s
      retries: 5
    volumes:
      - .:/app
      - /app/node_modules
    secrets:
      - db_password
      - cache_password
      - jwt_public
      - jwt_private
    depends_on:
      dev_db:
        condition: service_healthy
      dev_cache:
        condition: service_healthy
      db_migration:
        condition: service_completed_successfully

  dev_db:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
      - POSTGRES_DB=dev
    secrets:
      - db_password
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 20s
      timeout: 10s
      retries: 5

  dev_cache:
    image: redis:8.4.0-alpine
    command: >
      sh -c 'redis-server
      --requirepass "$$(cat /run/secrets/cache_password | tr -d "\n")"
      --appendonly yes'
    secrets:
      - cache_password
    volumes:
      - cache_data:/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "redis-cli -a \"$(cat /run/secrets/cache_password | tr -d '\n')\" PING",
        ]
      interval: 20s
      timeout: 10s
      retries: 5

secrets:
  db_password:
    file: ./secrets/db_password.secret
  cache_password:
    file: ./secrets/cache_password.secret
  jwt_public:
    file: ./secrets/jwt_public.pem
  jwt_private:
    file: ./secrets/jwt_private.pem

volumes:
  db_data:
    driver: local
  cache_data:
    driver: local