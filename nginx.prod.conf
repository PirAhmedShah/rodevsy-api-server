worker_processes auto;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    upstream nest_api {
        server api:8080;
        keepalive 32;
    }

    # --- Basics ---
    server_tokens off;
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # --- Timeouts ---
    keepalive_timeout 65;
    client_header_timeout 10s;
    client_body_timeout 10s;
    send_timeout 10s;
    reset_timedout_connection on;

    # --- Body limits ---
    client_max_body_size 64k;
    client_body_buffer_size 16k;

    # --- Gzip ---
    gzip on;
    gzip_types application/json text/plain application/javascript text/css;
    gzip_min_length 256;
    gzip_comp_level 4;
    gzip_vary on;

    # --- Rate limiting ---
    # Short: 5 req/s per IP - burst allows brief spikes without rejecting
    # Long:  60 req/min per IP - catches slow scrapers that stay under short limit
    limit_req_zone $binary_remote_addr zone=api_limit_short:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_limit_long:10m rate=60r/m;
    limit_req_status 429;

    # --- Connection limiting (new: max 20 simultaneous connections per IP) ---
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_conn_status 429;

    # --- SSL session cache (shared across workers) ---
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --- HTTP → HTTPS redirect ---
    server {
        listen 80;
        server_name api.rodevsy.app;

        # Allow Certbot ACME challenge through before redirecting
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS server ---
    server {
        listen 443 ssl;
        http2 on;
        server_name api.rodevsy.app;

        ssl_certificate /etc/letsencrypt/live/api.rodevsy.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.rodevsy.app/privkey.pem;

        # TLS 1.2 minimum - drops old clients (IE11, Android 4.x) which is fine for an API
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off; # TLS 1.3 ignores this; off lets client pick best cipher

        # --- Security headers ---
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always; # 2 years
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;

        # --- Gateway healthcheck (internal use - not rate limited) ---
        location /gateway {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # --- API ---
        location / {
            # Connection limit: max 20 simultaneous open connections per IP
            limit_conn conn_limit 20;

            # Rate limits: both zones apply - whichever triggers first wins
            limit_req zone=api_limit_short burst=10 nodelay;
            limit_req zone=api_limit_long burst=20;

            # CORS - swap origin for prod vs local
            set $cors_origin "https://rodevsy.app";
            # set $cors_origin "http://localhost:5173";  # uncomment for local dev

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "$cors_origin" always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Fingerprint" always;
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type "text/plain; charset=utf-8";
                add_header Content-Length 0;
                return 204;
            }

            add_header Access-Control-Allow-Origin "$cors_origin" always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Fingerprint" always;

            proxy_pass http://nest_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_hide_header X-Powered-By;

            # Proxy timeouts - fail fast, don't queue forever
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 30s; # raise if you have long-polling endpoints
        }
    }
}