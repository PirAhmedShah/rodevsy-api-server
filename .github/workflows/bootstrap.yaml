name: bootstrap

on:
  workflow_dispatch:

jobs:
  setup-vps:
    runs-on: ubuntu-latest
    steps:
      # Assuming the VPS exists, if not head over to Digital Ocean and Create VPS with SSH KEY
      # Also assuming that you have added VPS IPv4 to DNS A record api.rodevsy.app and ran certbot standalone dns verification for certs
      # then also created productions secrets ~/app/secrets

      # Required Secrets
      #   VPS_PRIVATE_SSH_KEY (private key)
      #   VPS_SSH_PASSPHRASE (private key passphrase)
      # Required Variables
      #   VPS_FINGERPRINT (machine id)
      #   VPS_PUBLIC_SSH_KEY (public key)
      #   VPS_HOST (ipv4 addr of vps)
      #   VPS_USER (The user that will be created with less privilleges)
      #   DOMAIN (The A Record pointing to vps, $(dig $DOMAIN +short) == $VPS_HOST before continuing)

      # After that, we will ssh into VPS

      - name: Configure VPS
        uses: appleboy/ssh-action@v1.2.5
        env:
          VPS_USER: ${{vars.VPS_USER}}
          VPS_PUBLIC_SSH_KEY: ${{vars.VPS_PUBLIC_SSH_KEY}}
          DOMAIN: ${{vars.DOMAIN}}
          EMAIL: ${{vars.EMAIL}}
          VPS_HOST: ${{vars.VPS_HOST}}
        with:
          host: ${{vars.VPS_HOST}}
          username: root
          key: ${{secrets.VPS_PRIVATE_SSH_KEY}}
          passphrase: ${{secrets.VPS_SSH_PASSPHRASE}}
          #fingerprint: ${{vars.VPS_FINGERPRINT}}
          envs: VPS_USER, VPS_HOST, VPS_PUBLIC_SSH_KEY, DOMAIN, EMAIL
          #As root we have to setup
          # install docker
          # create user named VPS_USER, generate its home dir and add docke as supplementary group
          # drop in sshd hardening config
          # create ~/.ssh/ and add ssh public key to ~/.ssh/authorized_keys
          # set proper permissions
          # verify sshd config and restart ssh daemon
          # create ~/app/ dir on behalf of $VPS_USER
          # exit
          script: |
            DOMAIN_VPS=$(dig $DOMAIN +short)
            if [[ "$VPS_HOST" != "$DOMAIN_VPS" ]]; then
              echo "Error: $DOMAIN MUST point to this VPS($VPS_HOST). Currently it's pointing to $DOMAIN_VPS. Update the DNS record before continuing." >&2
              exit 1
            fi

            curl https://get.docker.com/ | bash

            useradd -m -G docker $VPS_USER

            cat > /etc/ssh/sshd_config.d/99-hardening.conf << 'EOF'
            PermitRootLogin no
            PasswordAuthentication no
            X11Forwarding no
            MaxAuthTries 3
            EOF

            mkdir -p /home/$VPS_USER/.ssh
            echo "${VPS_PUBLIC_SSH_KEY}" > /home/$VPS_USER/.ssh/authorized_keys
            chown -R $VPS_USER:$VPS_USER /home/$VPS_USER/.ssh
            chmod 700 /home/$VPS_USER/.ssh
            chmod 600 /home/$VPS_USER/.ssh/authorized_keys

            sshd -t && systemctl restart ssh

            mkdir -p /home/$VPS_USER/app/
            chown $VPS_USER:$VPS_USER /home/$VPS_USER/app/

            docker run --rm --name certbot -p 80:80 -v "/etc/letsencrypt:/etc/letsencrypt" -v "/var/lib/letsencrypt:/var/lib/letsencrypt" certbot/certbot certonly --standalone --non-interactive -d $DOMAIN --email $EMAIL --agree-tos --no-eff-email

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Copying Nessesary files to ~/app/
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{vars.VPS_HOST}}
          username: ${{vars.VPS_USER}}
          key: ${{secrets.VPS_PRIVATE_SSH_KEY}}
          passphrase: ${{secrets.VPS_SSH_PASSPHRASE}}
          #fingerprint: ${{vars.VPS_FINGERPRINT}}
          source: 'nginx.prod.conf,migrations/,compose.prod.yaml'
          target: '/home/${{ vars.VPS_USER }}/app/'

      - name: Creating Secrets
        uses: appleboy/ssh-action@v1.2.5
        env:
          VPS_USER: ${{vars.VPS_USER}}
        with:
          host: ${{vars.VPS_HOST}}
          username: ${{vars.VPS_USER}}
          key: ${{secrets.VPS_PRIVATE_SSH_KEY}}
          passphrase: ${{secrets.VPS_SSH_PASSPHRASE}}
          #fingerprint: ${{vars.VPS_FINGERPRINT}}
          envs: VPS_USER
          script: |
            # Navigate to the application directory we just SCP'd files into

            mkdir ~/app/secrets
            openssl genpkey -algorithm ed25519 -out ~/app/secrets/jwt_private.pem
            openssl pkey -in ~/app/secrets/jwt_private.pem -pubout -out ~/app/secrets/jwt_public.pem
            openssl rand -hex -out ~/app/secrets/db_password.secret 32
            openssl rand -hex -out ~/app/secrets/cache_password.secret 32

  call-cicd:
    needs: setup-vps
    uses: ./.github/workflows/cicd.yaml
    secrets: inherit # This passes all your repo secrets (like VPS keys) down to the cicd workflow
